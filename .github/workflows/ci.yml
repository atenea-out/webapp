name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      PAYLOAD_SECRET: atenea-ci-secret
      DATABASE_URI: file:./atenea-ci.db
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Seed CI database
        run: node --import @swc-node/register/esm-register scripts/seed.ts

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all
